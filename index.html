<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
height:100vh;
width:100vw;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
overflow:hidden;
}

/* Top-left Texas Tech wordmark */

#top-logo{
position:absolute;
top:3vh;
left:3vw;
height:10vh; /* ~25% larger than original 8vh */
}

/* Bottom-right Rec logo */

#bottom-logo{
position:absolute;
bottom:3vh;
right:3vw;
width:12vw;
max-width:260px;
}

/* Welcome text */

#subtitle{
position:absolute;
top:14vh;
left:3vw; /* aligned with left side of logo */
font-size:clamp(24px,2.5vw,48px);
opacity:0.95;
text-align:left;
}

/* Clock */

#time{
font-size:clamp(120px,14vw,260px);
font-weight:bold;
text-align:center;
letter-spacing:.4vw;
line-height:1;
}

#date{
font-size:clamp(30px,3vw,70px);
margin-top:1vh;
text-align:center;
}

</style>
</head>

<body>

<!-- Top-left Texas Tech logo -->
<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="time"></div>
<div id="date"></div>

<!-- Bottom-right Rec logo -->
<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
