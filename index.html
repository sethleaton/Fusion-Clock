<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
}

/* Top left branding */

#rec-title{
position:absolute;
top:40px;
left:60px;
font-size:46px;
font-weight:bold;
font-family:"Times New Roman", Times, serif;
letter-spacing:1px;

/* red accent similar to the logo styling */
text-shadow:
2px 2px 0 #cc0000,
4px 4px 6px rgba(0,0,0,0.6);
}

#subtitle{
position:absolute;
top:95px;
left:60px;
font-size:22px;
opacity:0.95;
}

/* Clock */

#time{
font-size:180px;
font-weight:bold;
text-align:center;
letter-spacing:6px;
}

#date{
font-size:50px;
margin-top:10px;
text-align:center;
}

/* Bottom-right image */

#logo{
position:absolute;
bottom:30px;
right:40px;
width:180px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<div id="rec-title">Texas Tech University Recreation</div>
<div id="subtitle">Welcome to the Rec Center</div>

<div id="time"></div>
<div id="date"></div>

<img id="logo" src="https://play-lh.googleusercontent.com/AowrrGqZ3f7d-lER8rWrbXEO_tBq95uybqKmLtqcjMlZO51yPMq7Q-xo52NSI5L-RAE=w240-h480-rw">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
