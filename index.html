<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
width:100vw;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* Texas Tech Logo */

#top-logo{
position:absolute;
top:3vh;
left:50%;
transform:translateX(-50%);
width:40vw;
max-width:700px;
height:auto;
}

/* Subtitle */

#subtitle{
position:absolute;
top:12vh;
left:50%;
transform:translateX(-50%);
font-size:clamp(28px,3vw,60px);
text-align:center;
width:80%;
opacity:0.95;
}

/* Bottom Rec Logo */

#bottom-logo{
position:absolute;
bottom:3vh;
right:3vw;
width:12vw;
max-width:260px;
}

/* Clock */

#clock-container{
text-align:center;
}

#time{
font-size:clamp(120px,12vw,260px);
font-weight:bold;
letter-spacing:.4vw;
line-height:1;
}

#date{
font-size:clamp(32px,3vw,70px);
margin-top:1vh;
}

/* PORTRAIT MODE (9:16 screens) */

@media (orientation:portrait){

#top-logo{
width:70vw;
max-width:700px;
top:5vh;
}

#subtitle{
top:16vh;
font-size:clamp(30px,4vw,70px);
}

#time{
font-size:clamp(160px,18vw,320px);
}

#date{
font-size:clamp(40px,4vw,80px);
}

#bottom-logo{
width:28vw;
}

}

/* LANDSCAPE MODE (16:9 screens) */

@media (orientation:landscape){

#top-logo{
width:35vw;
top:3vh;
}

#subtitle{
top:12vh;
}

#time{
font-size:clamp(140px,12vw,260px);
}

#bottom-logo{
width:12vw;
}

}

</style>
</head>

<body>

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
<div id="time"></div>
<div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
