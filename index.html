<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
width:100vw;
background:linear-gradient(135deg,#cc0000,#000000);
color:white;
display:flex;
justify-content:center;
align-items:center;
}

/* MAIN SCREEN */
#screen{
position:relative;
width:100%;
height:100%;
}

/* TOP LOGO */
#top-logo{
position:absolute;
top:0;
left:0;
width:100%;
max-height:160px;
object-fit:contain;
}

/* SUBTITLE */
#subtitle{
position:absolute;
top:170px;
width:100%;
text-align:center;
font-size:42px;
}

/* CLOCK WRAPPER */
#clock-container{
position:absolute;
top:40%;
width:100%;
text-align:center;
overflow:hidden;
}

/* TIME */
#time{
font-size:120px;
font-weight:bold;
white-space:nowrap;
display:inline-block;
letter-spacing:2px;
}

/* AM/PM */
#ampm{
font-size:0.5em;
margin-left:10px;
}

/* DATE */
#date{
font-size:36px;
margin-top:10px;
}

/* BOTTOM LOGO */
#bottom-logo{
position:absolute;
bottom:20px;
right:20px;
width:180px;
}

</style>
</head>

<body>

<div id="screen">

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
    <div id="time"></div>
    <div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

</div>

<script>

/* SAFE CLOCK UPDATE (NO LOCALE METHODS) */
function updateClock(){

var now = new Date();

var hours = now.getHours();
var minutes = now.getMinutes();
var seconds = now.getSeconds();

var ampm = "AM";

if(hours >= 12){
ampm = "PM";
}

if(hours > 12){
hours = hours - 12;
}

if(hours === 0){
hours = 12;
}

/* pad numbers manually */
if(minutes < 10){
minutes = "0" + minutes;
}

if(seconds < 10){
seconds = "0" + seconds;
}

var timeString = hours + ":" + minutes + ":" + seconds;

/* SAFE DOM UPDATE */
document.getElementById("time").textContent = timeString;

/* AM/PM handled separately */
document.getElementById("ampm").textContent = " " + ampm;

/* SIMPLE DATE (no locale functions) */
var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

var dateString =
days[now.getDay()] + ", " +
months[now.getMonth()] + " " +
now.getDate() + ", " +
now.getFullYear();

document.getElementById("date").textContent = dateString;

fitClock();

}

/* AUTO FIT CLOCK TO WIDTH */
function fitClock(){

var container = document.getElementById("clock-container");
var timeEl = document.getElementById("time");

var size = 180;
var min = 40;

timeEl.style.fontSize = size + "px";

/* shrink until fits */
while(timeEl.offsetWidth > container.offsetWidth && size > min){
size = size - 2;
timeEl.style.fontSize = size + "px";
}

}

/* RUN CLOCK */
setInterval(updateClock, 1000);
updateClock();

/* HANDLE RESIZE */
window.onresize = function(){
fitClock();
};

</script>

</body>
</html>
