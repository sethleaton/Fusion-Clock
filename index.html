<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clock</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

#time{
font-size:120px;
}

#date{
font-size:40px;
margin-top:10px;
}

#logo{
position:fixed;
bottom:20px;
right:20px;
width:200px;
}

</style>
</head>

<body>

<div id="time"></div>
<div id="date"></div>

<img id="logo" src="PUT_LOGO_URL_HERE">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour: '2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday: 'long',
year: 'numeric',
month: 'long',
day: 'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
