<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* Fixed signage canvas */

#canvas{
width:1920px;
height:1080px;
position:absolute;
top:0;
left:0;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
}

/* Top-left Texas Tech wordmark */

#top-logo{
position:absolute;
top:40px;
left:60px;
height:110px; /* 25% larger */
}

/* Subtitle */

#subtitle{
position:absolute;
top:170px;
left:60px; /* perfectly aligned with logo */
font-size:40px;
opacity:0.95;
}

/* Bottom-right Rec logo */

#bottom-logo{
position:absolute;
bottom:40px;
right:60px;
width:230px;
}

/* Clock */

#clock-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-40%);
text-align:center;
}

#time{
font-size:180px;
font-weight:bold;
letter-spacing:6px;
line-height:1;
}

#date{
font-size:55px;
margin-top:10px;
}

</style>
</head>

<body>

<div id="canvas">

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
<div id="time"></div>
<div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

</div>

<script>

/* Clock */

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

/* Auto scale for any display */

function scaleCanvas(){

const canvas = document.getElementById("canvas");

const scaleX = window.innerWidth / 1920;
const scaleY = window.innerHeight / 1080;

const scale = Math.min(scaleX, scaleY);

canvas.style.transform = "scale(" + scale + ")";
canvas.style.transformOrigin = "top left";

}

window.addEventListener("resize", scaleCanvas);
scaleCanvas();

</script>

</body>
</html>
