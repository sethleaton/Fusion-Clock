<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 9:16 SAFE CONTAINER */

#screen{
position:relative;
width:56.25vh; /* 9:16 ratio (9/16 = 0.5625) */
height:100vh;
background:linear-gradient(135deg,#cc0000,#000000);
color:white;
overflow:hidden;
}

/* TOP LOGO */

#top-logo{
position:absolute;
top:2vh;
left:50%;
transform:translateX(-50%);
width:90%;
max-height:14vh;
object-fit:contain;
}

/* SUBTITLE */

#subtitle{
position:absolute;
top:18vh;
left:50%;
transform:translateX(-50%);
font-size:clamp(2vh,3.5vh,4.5vh);
text-align:center;
width:90%;
}

/* CLOCK */

#clock-container{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:100%;
}

#time{
font-size:clamp(8vh,10vh,12vh); /* scales with height */
font-weight:bold;
letter-spacing:.5vh;
line-height:1;
}

#date{
font-size:clamp(2.5vh,3vh,4vh);
margin-top:1vh;
}

/* BOTTOM LOGO */

#bottom-logo{
position:absolute;
bottom:3vh;
right:3vh;
width:18vh;
max-width:25%;
}

</style>
</head>

<body>

<div id="screen">

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
<div id="time"></div>
<div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

</div>

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
