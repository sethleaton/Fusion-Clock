<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
}

/* Top-left logo */

#top-logo{
position:absolute;
top:35px;
left:60px;
height:90px;
}

/* Subtitle */

#subtitle{
position:absolute;
top:120px;
left:60px;
font-size:30px;
opacity:0.95;
}

/* Clock */

#time{
font-size:180px;
font-weight:bold;
text-align:center;
letter-spacing:6px;
}

#date{
font-size:50px;
margin-top:10px;
text-align:center;
}

/* Bottom-right logo */

#bottom-logo{
position:absolute;
bottom:30px;
right:40px;
width:200px;
}

</style>
</head>

<body>

<!-- Top left logo -->
<img id="top-logo" src="TTU_DblT_UniversityRecreation_fl4C-copy">

<div id="subtitle">Welcome to the Rec Center</div>

<div id="time"></div>
<div id="date"></div>

<!-- Bottom right logo -->
<img id="bottom-logo" src="Unit-University-Recreation-fl4CBWrvs">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
