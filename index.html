<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
width:100vw;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* Top logo */

#top-logo{
position:absolute;
top:0;
left:0;
width:100%;
height:auto;
max-height:180px;
object-fit:contain;
}

/* Subtitle */

#subtitle{
position:absolute;
top:calc(180px + 20px);
left:50%;
transform:translateX(-50%);
font-size:clamp(28px,3vw,60px);
text-align:center;
width:90%;
opacity:0.95;
}

/* Bottom logo */

#bottom-logo{
position:absolute;
bottom:3vh;
right:3vw;
width:12vw;
max-width:260px;
}

/* Clock container */

#clock-container{
text-align:center;
margin-top:20px;
width:90%;              /* keeps clock inside safe bounds */
margin-left:auto;
margin-right:auto;
overflow:hidden;
}

/* Time (auto-sized by JS) */

#time{
font-size:120px;        /* starting size */
font-weight:bold;
letter-spacing:.15vw;
line-height:1;
white-space:nowrap;
display:inline-block;
}

/* AM/PM smaller but inline */

#ampm{
font-size:.45em;
margin-left:.5vw;
vertical-align:middle;
}

/* Date */

#date{
font-size:clamp(27px,2.5vw,59px);
margin-top:1vh;
}

/* PORTRAIT MODE */

@media (orientation:portrait){

#top-logo{
max-height:140px; 
}

#subtitle{
top:calc(140px + 20px);
font-size:clamp(30px,4vw,70px);
}

#bottom-logo{
width:28vw;
}

}

/* LANDSCAPE MODE */

@media (orientation:landscape){

#top-logo{
max-height:120px;
}

#subtitle{
top:calc(120px + 20px);
}

#bottom-logo{
width:12vw;
}

}

</style>
</head>

<body>

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
    <div id="time"></div>
    <div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

<script>

/* Auto-fit function */

function fitClock(){

const container = document.getElementById("clock-container");
const timeEl = document.getElementById("time");

let maxFontSize = 200;
let minFontSize = 40;

timeEl.style.fontSize = maxFontSize + "px";

/* shrink until it fits */
while (timeEl.scrollWidth > container.clientWidth && maxFontSize > minFontSize){
    maxFontSize -= 2;
    timeEl.style.fontSize = maxFontSize + "px";
}

}

/* Clock update */

function updateClock(){

const now = new Date();

const timeString = now.toLocaleTimeString([], {
hour:'numeric',
minute:'2-digit',
second:'2-digit',
hour12:true
});

/* split AM/PM */
const parts = timeString.split(' ');
const mainTime = parts[0];
const ampm = parts[1];

document.getElementById("time").innerHTML =
`${mainTime}<span id="ampm"> ${ampm}</span>`;

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("date").innerHTML = date;

/* adjust size AFTER updating text */
fitClock();

}

/* Run clock */

setInterval(updateClock,1000);
updateClock();

/* Handle screen resizes (Fusion Wave scaling) */

window.addEventListener("resize", fitClock);

</script>

</body>
</html>
