<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:black;
}

/* Portrait signage canvas */

#canvas{
width:1080px;
height:1920px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
}

/* Top centered Texas Tech wordmark */

#top-logo{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
width:520px; /* reduced so it fits portrait safely */
height:auto;
}

/* Subtitle centered under logo */

#subtitle{
position:absolute;
top:200px;
left:50%;
transform:translateX(-50%);
font-size:50px;
opacity:0.95;
text-align:center;
width:90%;
}

/* Bottom-right Rec logo */

#bottom-logo{
position:absolute;
bottom:80px;
right:60px;
width:260px;
}

/* Clock container */

#clock-container{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:100%;
}

/* Clock */

#time{
font-size:220px;
font-weight:bold;
letter-spacing:6px;
line-height:1;
}

#date{
font-size:70px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="canvas">

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
<div id="time"></div>
<div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

</div>

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

/* Auto scale for any display */

function scaleCanvas(){

const canvas = document.getElementById("canvas");

const scaleX = window.innerWidth / 1080;
const scaleY = window.innerHeight / 1920;

const scale = Math.max(scaleX, scaleY);

canvas.style.transform =
"translate(-50%, -50%) scale(" + scale + ")";

}

window.addEventListener("resize", scaleCanvas);
scaleCanvas();

</script>

</body>
</html>
