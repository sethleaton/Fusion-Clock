<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
}

#rec-title{
position:absolute;
top:40px;
left:60px;
font-size:42px;
font-weight:bold;
font-family:"Times New Roman", Times, serif;
}

#subtitle{
position:absolute;
top:90px;
left:60px;
font-size:22px;
opacity:0.9;
}

#time{
font-size:180px;
font-weight:bold;
text-align:center;
letter-spacing:6px;
}

#date{
font-size:50px;
margin-top:10px;
text-align:center;
}

#logo{
position:absolute;
bottom:30px;
right:40px;
width:200px;
opacity:0.95;
}

</style>
</head>

<body>

<div id="rec-title">Texas Tech University Recreation</div>
<div id="subtitle">Welcome to the Rec Center</div>

<div id="time"></div>
<div id="date"></div>

<img id="logo" src="https://i.ytimg.com/vi/5PgfkFheK04/hqdefault.jpg">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour: '2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday: 'long',
year: 'numeric',
month: 'long',
day: 'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
