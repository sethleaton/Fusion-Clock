<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* Portrait signage canvas */

#canvas{
width:1080px;
height:1920px;
position:absolute;
top:0;
left:0;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
}

/* Top-left Texas Tech wordmark */

#top-logo{
position:absolute;
top:60px;
left:60px;
height:140px; /* large for portrait */
}

/* Subtitle */

#subtitle{
position:absolute;
top:230px;
left:60px;
font-size:50px;
opacity:0.95;
max-width:900px;
}

/* Bottom-right Rec logo */

#bottom-logo{
position:absolute;
bottom:80px;
right:60px;
width:260px;
}

/* Clock container */

#clock-container{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:100%;
}

/* Clock */

#time{
font-size:220px;
font-weight:bold;
letter-spacing:6px;
line-height:1;
}

#date{
font-size:70px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="canvas">

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
<div id="time"></div>
<div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

</div>

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

/* Auto-scale to any screen */

function scaleCanvas(){

const canvas = document.getElementById("canvas");

const scaleX = window.innerWidth / 1080;
const scaleY = window.innerHeight / 1920;

const scale = Math.min(scaleX, scaleY);

canvas.style.transform = "scale(" + scale + ")";
canvas.style.transformOrigin = "top left";

}

window.addEventListener("resize", scaleCanvas);
scaleCanvas();

</script>

</body>
</html>
