<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
}

/* Top-left Texas Tech wordmark */

#top-logo{
position:absolute;
top:35px;
left:60px;
height:90px;
}

/* Bottom-left Rec logo (10% larger) */

#bottom-logo{
position:absolute;
bottom:30px;
left:60px;
width:220px; /* increased ~10% */
}

/* Welcome text */

#subtitle{
position:absolute;
top:120px;
left:60px;
font-size:30px;
opacity:0.95;
}

/* Clock */

#time{
font-size:180px;
font-weight:bold;
text-align:center;
letter-spacing:6px;
}

#date{
font-size:50px;
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<!-- Top-left Texas Tech logo -->
<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to the Rec Center</div>

<div id="time"></div>
<div id="date"></div>

<!-- Bottom-left Rec logo -->
<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
