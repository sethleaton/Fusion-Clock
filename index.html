<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texas Tech Rec Display</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
width:100vw;
color:white;
background:linear-gradient(135deg,#cc0000,#000000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* Top logo edge-to-edge */

#top-logo{
position:absolute;
top:0;
left:0;
width:100%; /* spans entire width */
height:auto;
max-height:180px; /* keeps it from being too tall */
object-fit:contain;
}

/* Subtitle under logo */

#subtitle{
position:absolute;
top:calc(180px + 20px); /* 20px padding under logo */
left:50%;
transform:translateX(-50%);
font-size:clamp(28px,3vw,60px);
text-align:center;
width:90%;
opacity:0.95;
}

/* Bottom-right Rec logo */

#bottom-logo{
position:absolute;
bottom:3vh;
right:3vw;
width:12vw;
max-width:260px;
}

/* Clock container */

#clock-container{
text-align:center;
margin-top:20px;
}

/* Clock (15% smaller) */

#time{
font-size:clamp(102px,10.2vw,221px); /* 15% smaller than previous ~120-260 */
font-weight:bold;
letter-spacing:.34vw;
line-height:1;
}

#date{
font-size:clamp(27px,2.55vw,59px);
margin-top:1vh;
}

/* PORTRAIT MODE */

@media (orientation:portrait){

#top-logo{
max-height:140px; 
}

#subtitle{
top:calc(140px + 20px);
font-size:clamp(30px,4vw,70px);
}

#time{
font-size:clamp(136px,15.3vw,272px); /* 15% smaller than original */
}

#date{
font-size:clamp(34px,3.4vw,68px);
}

#bottom-logo{
width:28vw;
}

}

/* LANDSCAPE MODE */

@media (orientation:landscape){

#top-logo{
max-height:120px;
}

#subtitle{
top:calc(120px + 20px);
}

#time{
font-size:clamp(119px,10.2vw,221px);
}

#bottom-logo{
width:12vw;
}

}

</style>
</head>

<body>

<img id="top-logo" src="Texas-Tech-Word-Mark-1Lrvs.png">

<div id="subtitle">Welcome to University Recreation</div>

<div id="clock-container">
<div id="time"></div>
<div id="date"></div>
</div>

<img id="bottom-logo" src="University Recreation fl4CBWrvs.png">

<script>

function updateClock(){

const now = new Date();

const time = now.toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

const date = now.toLocaleDateString([], {
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("time").innerHTML = time;
document.getElementById("date").innerHTML = date;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
